name: Docs
on:
  push:
    paths:
      - '.github/workflows/docs.yml'
      - 'src/**'
      - 'Makefile'
jobs:
  job_build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: astral-sh/setup-uv@v8.1.0
      - uses: actions/checkout@v5
      - run: make build
  job_deploy:
    # deploy only for the "main" branch
    if: ${{ github.ref == 'refs/heads/main' }}
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: astral-sh/setup-uv@v8.1.0
      - uses: actions/checkout@v5
      - run: make deploy
